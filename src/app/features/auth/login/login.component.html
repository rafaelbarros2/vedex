<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <!-- Logo / Branding -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white/10 backdrop-blur mb-4">
        <span class="text-4xl">🏪</span>
      </div>
      <h1 class="text-4xl font-bold text-white mb-1">VendeX ERP</h1>
      <p class="text-blue-200 text-sm">Sistema de gestão para sua loja</p>
    </div>

    <!-- Card de login -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <h2 class="text-xl font-semibold text-gray-800">Bem-vindo</h2>
        <p class="text-gray-500 text-sm mt-1">Faça login para acessar o sistema</p>
      </div>

      @if (error()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2">
          <i class="pi pi-exclamation-triangle text-red-500 mt-0.5 flex-shrink-0"></i>
          <p class="text-sm text-red-700">{{ error() }}</p>
        </div>
      }

      <p-button
        label="Entrar com Keycloak"
        icon="pi pi-sign-in"
        styleClass="w-full p-button-lg justify-center"
        [loading]="loading()"
        (onClick)="login()"
      ></p-button>

      <p-divider styleClass="my-5">
        <span class="text-gray-400 text-xs">seguro via SSO</span>
      </p-divider>

      <div class="flex items-center gap-2 text-xs text-gray-400 justify-center">
        <i class="pi pi-shield text-green-500"></i>
        <span>Autenticação gerenciada pelo Keycloak</span>
      </div>
    </div>

    <!-- Rodapé -->
    <p class="text-center text-blue-200 text-xs mt-6">&copy; {{ currentYear }} VendeX System · Todos os direitos reservados</p>
  </div>
</div>
