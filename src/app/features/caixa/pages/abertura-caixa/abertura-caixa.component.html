<p-toast></p-toast>

<div class="flex items-center justify-center min-h-[calc(100vh-8rem)]">

  <!-- Acesso negado para OPERADOR/VENDEDOR -->
  @if (!podeAbrirCaixa()) {
    <div class="w-full max-w-md text-center p-8 bg-red-50 border border-red-200 rounded-2xl shadow">
      <i class="pi pi-lock text-6xl text-red-400 mb-4 block"></i>
      <h2 class="text-2xl font-bold text-red-700 mb-2">Acesso Restrito</h2>
      <p class="text-red-600 mb-6">
        A abertura de caixa é exclusiva para <strong>Gerentes</strong> e <strong>Administradores</strong>.
        <br>Entre em contato com seu gerente para abrir o caixa.
      </p>
      <button
        pButton
        label="Voltar ao Dashboard"
        icon="pi pi-home"
        class="p-button-outlined p-button-danger"
        (click)="cancelar()"
      ></button>
    </div>
  } @else {
    <p-card class="w-full max-w-md">
      <ng-template pTemplate="header">
        <div class="p-6 pb-0">
          <h2 class="text-2xl font-bold text-gray-800 mb-2">Abertura de Caixa</h2>
          <p class="text-sm text-gray-600">Informe os dados iniciais para começar o dia</p>
        </div>
      </ng-template>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Identificação do PDV
          </label>
          <input
            pInputText
            [(ngModel)]="identificadorPdv"
            placeholder="Ex: PDV 01, Caixa Principal, Balcão"
            class="w-full"
            maxlength="50"
          />
          <p class="text-xs text-gray-400 mt-1">Identifica qual terminal/caixa está sendo aberto</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Valor de Abertura (Fundo de Troco) *
          </label>
          <p-inputNumber
            [(ngModel)]="valorAbertura"
            mode="currency"
            currency="BRL"
            locale="pt-BR"
            [min]="0"
            class="w-full"
            [inputStyleClass]="'w-full text-2xl'"
            [showButtons]="true"
            [step]="10"
          ></p-inputNumber>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Observações</label>
          <input
            pInputText
            [(ngModel)]="observacoes"
            placeholder="Opcional"
            class="w-full"
          />
        </div>
      </div>

      <ng-template pTemplate="footer">
        <div class="flex gap-2">
          <button
            pButton
            label="Cancelar"
            icon="pi pi-times"
            class="p-button-outlined flex-1"
            (click)="cancelar()"
          ></button>
          <button
            pButton
            label="Abrir Caixa"
            icon="pi pi-check"
            class="flex-1"
            (click)="abrirCaixa()"
          ></button>
        </div>
      </ng-template>
    </p-card>
  }

</div>
