<p-toast></p-toast>

<div class="flex items-center justify-center min-h-[calc(100vh-8rem)]">
  <p-card class="w-full max-w-md">
    <ng-template pTemplate="header">
      <div class="p-6 pb-0">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Abertura de Caixa</h2>
        <p class="text-sm text-gray-600">Informe o valor inicial de troco para começar o dia</p>
      </div>
    </ng-template>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Valor de Abertura (Fundo de Troco) *
        </label>
        <p-inputNumber
          [(ngModel)]="valorAbertura"
          mode="currency"
          currency="BRL"
          locale="pt-BR"
          [min]="0"
          class="w-full"
          [inputStyleClass]="'w-full text-2xl'"
          [showButtons]="true"
          [step]="10"
        ></p-inputNumber>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Observações</label>
        <input
          pInputText
          [(ngModel)]="observacoes"
          placeholder="Opcional"
          class="w-full"
        />
      </div>
    </div>

    <ng-template pTemplate="footer">
      <div class="flex gap-2">
        <button
          pButton
          label="Cancelar"
          icon="pi pi-times"
          class="p-button-outlined flex-1"
          (click)="cancelar()"
        ></button>
        <button
          pButton
          label="Abrir Caixa"
          icon="pi pi-check"
          class="flex-1"
          (click)="abrirCaixa()"
        ></button>
      </div>
    </ng-template>
  </p-card>
</div>
