<p-toast></p-toast>

<div class="p-4 max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <p-button icon="pi pi-arrow-left" [rounded]="true" [text]="true" severity="secondary" (onClick)="cancelar()"></p-button>
    <div>
      <h1 class="text-2xl font-bold text-gray-800 dark:text-white">
        {{ isEditMode ? 'Editar Conta a Receber' : 'Nova Conta a Receber' }}
      </h1>
    </div>
  </div>

  <p-card>
    <div class="flex flex-col gap-4">
      <!-- Status (somente modo edição) -->
      <div *ngIf="isEditMode && statusAtual()" class="flex items-center gap-2 p-3 bg-gray-50 dark:bg-gray-800 rounded">
        <span class="text-sm text-gray-500">Status atual:</span>
        <span class="font-semibold">{{ statusAtual() }}</span>
      </div>

      <!-- Descrição -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Descrição *</label>
        <input pInputText [(ngModel)]="descricao" placeholder="Ex: Parcela cliente João, Serviço prestado..." class="w-full" />
      </div>

      <!-- Valor + Vencimento -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Valor *</label>
          <p-inputNumber [(ngModel)]="valor" mode="currency" currency="BRL" locale="pt-BR"
            placeholder="R$ 0,00" class="w-full"></p-inputNumber>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Data de Vencimento *</label>
          <p-calendar [(ngModel)]="dataVencimento" dateFormat="dd/mm/yy" [showIcon]="true"
            placeholder="dd/mm/aaaa" class="w-full"></p-calendar>
        </div>
      </div>

      <!-- Categoria -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Categoria</label>
        <p-dropdown [options]="categoriaOptions" [(ngModel)]="categoria"
          optionLabel="label" optionValue="value"
          placeholder="Selecione uma categoria" [showClear]="true" class="w-full"></p-dropdown>
      </div>

      <!-- Observações -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Observações</label>
        <textarea pInputTextarea [(ngModel)]="observacoes" rows="3"
          placeholder="Observações adicionais..." class="w-full resize-none"></textarea>
      </div>

      <!-- Botões -->
      <div class="flex justify-end gap-3 mt-2">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="cancelar()"></p-button>
        <p-button [label]="salvando ? 'Salvando...' : (isEditMode ? 'Atualizar' : 'Criar Conta')"
          icon="pi pi-save" [loading]="salvando" [disabled]="!formularioValido()"
          (onClick)="salvar()"></p-button>
      </div>
    </div>
  </p-card>
</div>
