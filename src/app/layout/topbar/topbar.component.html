<div class="fixed top-0 left-0 right-0 h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 z-[100] shadow-sm">
  <!-- Left Section -->
  <div class="flex items-center gap-5">
    <button
      (click)="onMenuToggle()"
      class="w-10 h-10 border-0 bg-transparent cursor-pointer flex items-center justify-center rounded-lg transition-all hover:bg-gray-100"
    >
      <span class="text-2xl">☰</span>
    </button>

    <div class="flex items-center gap-2 text-xl font-bold text-blue-600">
      <span>🏪</span>
      <span>VendeX ERP</span>
    </div>

    <div class="relative w-96 hidden md:block">
      <span class="p-input-icon-left w-full">
        <i class="pi pi-search text-gray-400"></i>
        <input
          pInputText
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Buscar produtos, vendas, clientes..."
          class="w-full py-2.5 pl-10 pr-4 border-2 border-gray-200 rounded-lg text-sm transition-all focus:border-blue-500"
        />
      </span>
    </div>
  </div>

  <!-- Right Section -->
  <div class="flex items-center gap-3">
    <!-- Cash Info -->
    @if (caixaAberto()) {
      <div class="px-4 border-l border-r border-gray-200 hidden lg:block">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Caixa</div>
        <div class="text-sm font-semibold text-green-600">
          {{ saldoCaixa() !== null ? (saldoCaixa()! | currency:'BRL':'symbol':'1.2-2':'pt-BR') : 'Carregando...' }}
        </div>
      </div>
    } @else {
      <div class="px-4 border-l border-r border-gray-200 hidden lg:block">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Caixa</div>
        <div class="text-sm font-semibold text-red-500">Fechado</div>
      </div>
    }

    <!-- Notifications -->
    <button
      pButton
      type="button"
      icon="pi pi-bell"
      class="p-button-text p-button-rounded relative"
    ></button>

    <!-- Settings -->
    <button
      pButton
      type="button"
      icon="pi pi-cog"
      class="p-button-text p-button-rounded"
    ></button>

    <!-- User Menu -->
    <div
      class="flex items-center gap-3 py-1.5 px-3 rounded-lg cursor-pointer transition-all hover:bg-gray-100"
      (click)="userMenu.toggle($event)"
    >
      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-purple-500 to-purple-700 flex items-center justify-center text-white font-semibold text-sm">
        {{ getUserInitials() }}
      </div>
      <div class="hidden xl:block">
        <div class="text-sm font-semibold text-gray-800">{{ getUserDisplayName() }}</div>
        <div class="text-xs text-gray-500">{{ getUserRole() }}</div>
      </div>
      <i class="pi pi-chevron-down text-xs text-gray-500 hidden xl:block"></i>
    </div>

    <!-- User Dropdown Menu -->
    <p-menu
      #userMenu
      [model]="userMenuItems()"
      [popup]="true"
      styleClass="w-56"
    ></p-menu>
  </div>
</div>
